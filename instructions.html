<!DOCTYPE html>
<html>
<head>
    <title>Quiz Instructions | Online Quiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e0e7ff, #f8fafc);
            min-height: 100vh;
        }

        .instruction-box {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        li {
            margin-bottom: 10px;
        }
    </style>

    <script>
        function startQuiz() {
            window.location.href = "quiz.html";
        }

        function goBack() {
            window.location.href = "course.html";
        }

        window.onload = function () {
            const course = localStorage.getItem("selectedCourse");
            const courseMap = {
                c: "C Programming",
                python: "Python Programming",
                java: "Java Programming",
                os: "Operating System"
            };
            document.getElementById("courseName").innerText =
                courseMap[course] || "Selected Course";
        };
    </script>
</head>

<body>

<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-info-circle-fill"></i> Quiz Instructions
        </span>
    </div>
</nav>

<div class="container d-flex justify-content-center align-items-center mt-5">
    <div class="instruction-box col-md-8">

        <h3 class="fw-bold mb-3 text-center">
            Instructions for <span id="courseName"></span>
        </h3>

        <ul class="fs-5">
            <li>Each quiz contains multiple-choice questions.</li>
            <li>Each question has only one correct answer.</li>
            <li>No negative marking.</li>
            <li>Do not refresh or close the browser during the quiz.</li>
            <li>Your score will be displayed after submission.</li>
        </ul>

        <div class="d-flex justify-content-between mt-4">
            <button class="btn btn-outline-secondary btn-lg" onclick="goBack()">
                <i class="bi bi-arrow-left-circle"></i> Back to Courses
            </button>

            <button class="btn btn-success btn-lg" onclick="startQuiz()">
                <i class="bi bi-play-circle-fill"></i> Start Quiz
            </button>
        </div>

    </div>
</div>

</body>
</html>
