<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(120deg, #e0c3fc, #8ec5fc);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }

        .left-panel {
            background: linear-gradient(135deg, #6f42c1, #5a8dee);
            color: #fff;
            padding: 50px 40px;
        }

        .left-panel h2 {
            font-weight: 600;
        }

        .left-panel p {
            font-size: 14px;
            opacity: 0.9;
        }

        .illustration-box {
            margin-top: 30px;
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .illustration-box h5 {
            margin-top: 15px;
            font-weight: 500;
        }

        .right-panel {
            padding: 50px 40px;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px;
        }

        .btn-register {
            background: #6f42c1;
            color: white;
            border-radius: 10px;
            padding: 10px;
            font-weight: 500;
        }

        .btn-register:hover {
            background: #5a34a3;
        }
    </style>
</head>

<body>

<div class="register-container row g-0">

    <!-- LEFT PANEL -->
    <div class="col-md-5 left-panel">
        <h2>Quiz Registration</h2>
        <p>
            Register now to access online quizzes, track your progress,
            and earn certificates after successful completion.
        </p>

        <div class="illustration-box">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" width="120">
            <h5>Start Your Learning Journey</h5>
            <p style="font-size:13px;">
                Secure | Fast | Professional
            </p>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="col-md-7 right-panel">
        <h3 class="mb-4 text-center">Student Registration</h3>

        <form onsubmit="saveRegistration(event)">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" id="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-register w-100 mt-2">
                Register
            </button>

            <p class="text-center mt-3">
                Already registered?
                <a href="login.html">Login here</a>
            </p>
        </form>
    </div>

</div>

<script>
    function saveRegistration(e) {
        e.preventDefault();

        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPassword").value;

        if (password !== confirm) {
            alert("Passwords do not match");
            return;
        }

        // Save to localStorage (for demo project)
        localStorage.setItem("reg_name", name);
        localStorage.setItem("reg_email", email);
        localStorage.setItem("reg_password", password);

        alert("Registration Successful!");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
