<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard | Online Quiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2ff, #eef2ff);
            min-height: 100vh;
        }

        .course-card {
            border-radius: 22px;
            transition: 0.35s ease;
            cursor: pointer;
            border: none;
        }

        .course-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

        .course-icon {
            font-size: 70px;
        }

        /* SUBJECT COLORS */
        .c-bg {
            background: linear-gradient(135deg, #2563eb, #60a5fa);
            color: white;
        }

        .python-bg {
            background: linear-gradient(135deg, #15803d, #4ade80);
            color: white;
        }

        .java-bg {
            background: linear-gradient(135deg, #b91c1c, #f87171);
            color: white;
        }

        .os-bg {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: white;
        }

        h4 {
            letter-spacing: 0.5px;
        }
    </style>

    <script>
        function startQuiz(course) {
            localStorage.setItem("selectedCourse", course);
            window.location.href = "instructions.html";
        }

        window.onload = function () {
            document.getElementById("username").innerText =
                localStorage.getItem("username") || "Student";
        };
    </script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-mortarboard-fill"></i> Online Quiz System
        </span>

        <span class="text-white">
            Welcome, <strong id="username"></strong>
        </span>
    </div>
</nav>

<!-- DASHBOARD -->
<div class="container mt-5">

    <h4 class="fw-bold text-center mb-4">
        Click a Course to Start Quiz
    </h4>

    <div class="row justify-content-center g-4">

        <!-- C LANGUAGE -->
        <div class="col-md-3">
            <div class="card course-card c-bg text-center p-4"
                 onclick="startQuiz('c')">
                <div class="course-icon mb-3">
                    <i class="bi bi-code-slash"></i>
                </div>
                <h4 class="fw-bold">C Programming</h4>
            </div>
        </div>

        <!-- PYTHON -->
        <div class="col-md-3">
            <div class="card course-card python-bg text-center p-4"
                 onclick="startQuiz('python')">
                <div class="course-icon mb-3">
                    <i class="bi bi-filetype-py"></i>
                </div>
                <h4 class="fw-bold">Python Programming</h4>
            </div>
        </div>

        <!-- JAVA -->
        <div class="col-md-3">
            <div class="card course-card java-bg text-center p-4"
                 onclick="startQuiz('java')">
                <div class="course-icon mb-3">
                    <i class="bi bi-cup-hot-fill"></i>
                </div>
                <h4 class="fw-bold">Java Programming</h4>
            </div>
        </div>

        <!-- OPERATING SYSTEM -->
        <div class="col-md-3">
            <div class="card course-card os-bg text-center p-4"
                 onclick="startQuiz('os')">
                <div class="course-icon mb-3">
                    <i class="bi bi-hdd-network-fill"></i>
                </div>
                <h4 class="fw-bold">Operating System</h4>
            </div>
        </div>

    </div>

</div>

</body>
</html>
