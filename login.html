<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #8e9eab, #eef2f3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            background: #fff;
            width: 900px;
            max-width: 95%;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .login-left {
            padding: 50px 40px;
        }

        .login-left h3 {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .social-icons i {
            font-size: 18px;
            margin: 0 8px;
            cursor: pointer;
            color: #6f42c1;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px;
        }

        .btn-login {
            background: #6f42c1;
            color: white;
            border-radius: 10px;
            padding: 10px;
            font-weight: 500;
        }

        .btn-login:hover {
            background: #59339d;
        }

        .btn-signup {
            border-radius: 10px;
            padding: 10px;
        }

        .login-right {
            background: linear-gradient(135deg, #6f42c1, #8b5cf6);
            color: white;
            padding: 50px;
            position: relative;
        }

        .login-right img {
            max-width: 100%;
        }

        .login-right h4 {
            font-weight: 600;
        }

        .login-right p {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="login-wrapper row g-0">

    <!-- LEFT LOGIN FORM -->
    <div class="col-md-5 login-left">
        <h3>Student Login</h3>

        <div class="social-icons my-3">
            <i class="bi bi-google"></i>
            <i class="bi bi-linkedin"></i>
            <i class="bi bi-facebook"></i>
            <i class="bi bi-twitter"></i>
        </div>

        <p class="text-muted mb-4">or use your email to login</p>

        <form onsubmit="loginStudent(event)">
            <div class="mb-3">
                <label>Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-login w-50">Login</button>
                <a href="register.html" class="btn btn-outline-secondary w-50 btn-signup">Sign Up</a>
            </div>
        </form>
    </div>

    <!-- RIGHT ILLUSTRATION -->
    <div class="col-md-7 login-right d-flex flex-column justify-content-center align-items-center text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" width="280">
        <h4 class="mt-4">Learn • Practice • Achieve</h4>
        <p>
            Attempt quizzes, track progress, and earn certificates
            after successful completion.
        </p>
    </div>

</div>

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<script>
    function loginStudent(e) {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const savedEmail = localStorage.getItem("reg_email");
        const savedPassword = localStorage.getItem("reg_password");

        if (email === savedEmail && password === savedPassword) {
            alert("Login Successful");

            // 👉 Navigate to COURSE SELECTION (logos page)
            window.location.href = "course.html";

        } else {
            alert("Invalid login credentials");
        }
    }
</script>


</body>
</html>
